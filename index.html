<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeFriend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #facc15;
            --accent-dim: #eab308;
            --danger: #facc15;
            --danger-dim: #eab308;
            --warning: #facc15;
            --warning-dim: #eab308;
            --info: #facc15;
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #111111;
            --border: #333333;
            --text-primary: #facc15;
            --text-secondary: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            letter-spacing: 0.02em;
            font-weight: 500;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        .pulse-ring-delay { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) 0.5s infinite; }

        @keyframes mic-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.97); }
        }
        .mic-pulse { animation: mic-pulse 1.5s ease-in-out infinite; }

        @keyframes slide-up {
            from { transform: translateY(20px) translateX(-50%); opacity: 0; }
            to { transform: translateY(0) translateX(-50%); opacity: 1; }
        }
        .slide-up { animation: slide-up 0.3s ease-out forwards; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fade-in 0.2s ease-out forwards; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #444; }

        .glow-yellow { box-shadow: 0 0 30px rgba(250,204,21,0.4), 0 0 60px rgba(250,204,21,0.15); }
        .glow-accent { box-shadow: 0 0 30px rgba(250,204,21,0.4), 0 0 60px rgba(250,204,21,0.15); }

        @keyframes alert-in {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .alert-in { animation: alert-in 0.25s ease-out forwards; }
    </style>

{

}

</head>

</html>
